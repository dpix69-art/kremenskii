backend:
  name: github
  repo: dpix69-art/kremenskii
  branch: main

media_folder: client/public/images
public_folder: /images

collections:

  # ═══════════════════════════════════════
  # SITE & NAVIGATION
  # ═══════════════════════════════════════
  - name: settings
    label: "⚙️ Site & Navigation"
    files:
      - name: site
        label: "Site Settings"
        file: client/public/content/site.json
        fields:
          - name: site
            label: Site
            widget: object
            fields:
              - { name: artistName, label: "Artist Name", widget: string }
              - { name: role, label: "Role / Subtitle", widget: string }
              - { name: statement, label: "Homepage Statement", widget: text }
              - name: homeFeatured
                label: "Featured Works on Homepage"
                widget: list
                max: 2
                fields:
                  - { name: series, label: "Series Slug", widget: string }
                  - { name: work, label: "Work Slug", widget: string }
          - name: nav
            label: Navigation
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: "URL Path", widget: string, hint: "e.g. /gallery or /sounds" }
          - name: footer
            label: Footer
            widget: object
            required: false
            fields:
              - { name: legal, label: "Legal Text", widget: string, required: false }
              - { name: copyright, label: "Copyright Text", widget: string, required: false }

  # ═══════════════════════════════════════
  # STATEMENT & BIO
  # ═══════════════════════════════════════
  - name: statement
    label: "📝 Statement & Bio"
    files:
      - name: statement
        label: "Statement"
        file: client/public/content/statement.json
        fields:
          - { name: portrait, label: "Portrait Image", widget: image, required: false }
          - name: paragraphs
            label: "Statement Paragraphs"
            widget: list
            field: { name: text, label: Paragraph, widget: text }
          - name: exhibitions
            label: "Exhibitions & Performances"
            widget: list
            fields:
              - { name: year, label: Year, widget: string }
              - { name: event, label: Event, widget: string }
          - { name: pressKitPdf, label: "Press Kit PDF Path", widget: string, required: false }

  # ═══════════════════════════════════════
  # CONTACTS
  # ═══════════════════════════════════════
  - name: contacts
    label: "📧 Contacts"
    files:
      - name: contacts
        label: "Contact Info"
        file: client/public/content/contacts.json
        fields:
          - { name: email, label: Email, widget: string }
          - { name: city, label: City, widget: string }
          - { name: country, label: Country, widget: string }
          - { name: introText, label: "Intro Text", widget: string, required: false }
          - { name: openToText, label: "Open To Text", widget: string, required: false }
          - { name: portfolioPdf, label: "Portfolio PDF Path", widget: string, required: false }
          - name: socials
            label: Social Links
            widget: list
            fields:
              - { name: label, label: "Platform Name", widget: string }
              - { name: href, label: URL, widget: string }

  # ═══════════════════════════════════════
  # ARTWORK SERIES
  # ═══════════════════════════════════════
  - name: series
    label: "🎨 Artwork Series"
    files:
      - name: series
        label: "All Series"
        file: client/public/content/series.json
        fields:
          - name: series
            label: Series
            label_singular: Series
            widget: list
            fields:
              - { name: slug, label: Slug, widget: string, hint: "URL-safe, e.g. farbkoerper" }
              - { name: title, label: Title, widget: string }
              - { name: year, label: Year, widget: string }
              - { name: intro, label: "Introduction", widget: text }
              - name: artworkImages
                label: "Preview Images (gallery index)"
                widget: list
                max: 3
                field: { name: url, label: Image, widget: image }
              - name: works
                label: Works
                label_singular: Work
                widget: list
                fields:
                  - { name: slug, label: Slug, widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: year, label: Year, widget: number, value_type: int }
                  - { name: technique, label: Technique, widget: string, required: false }
                  - { name: dimensions, label: Dimensions, widget: string, required: false }
                  - name: images
                    label: Images
                    widget: list
                    fields:
                      - { name: url, label: Image, widget: image }
                      - name: role
                        label: Role
                        widget: select
                        options: ["main", "detail", "angle", "installation-view"]
                        default: "detail"
                  - name: sale
                    label: "Sale Info"
                    widget: object
                    required: false
                    fields:
                      - name: availability
                        label: Availability
                        widget: select
                        options: ["available", "sold", "reserved", "not_for_sale"]
                        default: "available"
                      - name: price
                        label: Price
                        widget: object
                        required: false
                        fields:
                          - { name: mode, label: Mode, widget: select, options: ["fixed", "on_request"], default: "on_request" }
                          - { name: amount, label: "Amount", widget: number, required: false }
                          - { name: currency, label: Currency, widget: string, default: "EUR", required: false }
                      - { name: notes, label: Notes, widget: string, required: false }

  # ═══════════════════════════════════════
  # SOUND PROJECTS
  # ═══════════════════════════════════════
  - name: sounds
    label: "🔊 Sound Projects"
    files:
      - name: sounds
        label: "All Sound Projects"
        file: client/public/content/sounds.json
        fields:
          - name: sounds
            label: Projects
            label_singular: Project
            widget: list
            fields:
              - { name: slug, label: Slug, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: year, label: Year, widget: number, value_type: int }
              - { name: platform, label: Platform, widget: select, options: ["bandcamp", "soundcloud", "youtube"], required: false }
              - { name: pageUrl, label: "Page URL", widget: string, required: false }
              - { name: summary, label: Summary, widget: text, required: false }
              - { name: cover, label: "Cover Image", widget: image, required: false }
              - { name: embed, label: "Embed URL", widget: string, required: false }
              - { name: video, label: "Video URL (YouTube)", widget: string, required: false }
              - { name: location, label: Location, widget: string, required: false }
              - name: meta
                label: Metadata
                widget: object
                required: false
                fields:
                  - { name: label, label: "Label", widget: string, required: false }
                  - name: platforms
                    label: Platforms
                    widget: list
                    required: false
                    field: { name: name, label: Name, widget: string }
              - name: tracks
                label: Tracks
                widget: list
                required: false
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: duration, label: Duration, widget: string, required: false }
              - name: photos
                label: Photos
                widget: list
                required: false
                fields:
                  - { name: url, label: Image, widget: image }
                  - { name: alt, label: "Alt Text", widget: string, required: false }
              - name: bodyBlocks
                label: "Text Blocks"
                widget: list
                required: false
                fields:
                  - { name: type, label: Type, widget: select, options: ["p", "h2", "h3"], default: "p" }
                  - { name: text, label: Text, widget: text }

  # ═══════════════════════════════════════
  # IMPRESSUM
  # ═══════════════════════════════════════
  - name: impressum
    label: "⚖️ Impressum"
    files:
      - name: impressum
        label: "Impressum"
        file: client/public/content/impressum.json
        fields:
          - name: paragraphs
            label: "Paragraphs"
            widget: list
            required: false
            field: { name: text, label: Paragraph, widget: text }
